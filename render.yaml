services:
  - type: web
    name: mentorat-ifri-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --worker-class eventlet -b 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mentorat-db
          property: connectionString

databases:
  - name: mentorat-db
    plan: free
