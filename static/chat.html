<!DOCTYPE html>
<html>
<head>
    <title>Test Messagerie</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 20px auto; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .msg { margin: 5px 0; padding: 5px; border-radius: 5px; }
        .mine { background: #d4edda; text-align: right; }
        .other { background: #e2e3e5; text-align: left; }
        input, button { padding: 10px; margin: 5px; }
        #messageInput { width: 70%; }
    </style>
</head>
<body>
    <h2>Messagerie - Test</h2>
    
    <div>
        <label>Token JWT :</label>
        <input type="text" id="tokenInput" placeholder="Colle ton token ici" style="width:100%">
    </div>
    <div>
        <label>ID Conversation :</label>
        <input type="number" id="convIdInput" value="1">
    </div>
    <div>
        <label>Ton ID Utilisateur :</label>
        <input type="number" id="userIdInput" value="1">
    </div>
    <button onclick="connect()">Se connecter</button>
    
    <hr>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="Tape ton message...">
    <button onclick="sendMessage()">Envoyer</button>

    <script>
        let socket;

        function connect() {
            const token = document.getElementById('tokenInput').value;
            const convId = document.getElementById('convIdInput').value;
            const userId = document.getElementById('userIdInput').value;

            socket = io('http://localhost:5000');

            socket.on('connect', () => {
                console.log('Connecté !');
                addMessage('System', 'Connecté au serveur');
                socket.emit('join', { conversation_id: convId });
            });

            socket.on('new_message', (data) => {
                const isMine = data.sender_id == userId;
                addMessage(isMine ? 'Moi' : 'Autre', data.content, isMine);
            });

            document.getElementById('sendBtn').disabled = false;
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value;
            const convId = document.getElementById('convIdInput').value;
            const userId = document.getElementById('userIdInput').value;

            if (content && socket) {
                socket.emit('send_message', {
                    user_id: parseInt(userId),
                    conversation_id: parseInt(convId),
                    content: content
                });
                document.getElementById('messageInput').value = '';
            }
        }

        function addMessage(sender, text, isMine = false) {
            const div = document.createElement('div');
            div.className = 'msg ' + (isMine ? 'mine' : 'other');
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    </script>
</body>
</html>
